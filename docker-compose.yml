version: '3.8'

services:
  novel-agent:
    build: .
    container_name: novel-agent
    ports:
      - "5002:5002"
    env_file:
      - .env
    volumes:
      - ./output:/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/state"]
      interval: 30s
      timeout: 10s
      retries: 3
